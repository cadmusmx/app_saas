name: gaso_tenant_app
description: "App para ERP de clientes/tenants Gaso."
version: 1.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  shared_preferences: ^2.5.5
  envied: ^1.3.5
  intl: ^0.20.2
  http: ^1.6.0
  connectivity_plus: ^7.1.1
  internet_connection_checker: ^1.0.0+1
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  flutter_staggered_grid_view: ^0.7.0
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  flutter_cache_manager: ^3.4.1
  flutter_cached_pdfview: ^0.4.3
  app_links: ^7.1.1
  flutter_secure_storage: ^10.3.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.4
  build_runner: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/gaso-black.png"
  adaptive_icon_background: "#ffffff"  
  adaptive_icon_foreground: "assets/images/gaso-black.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/